name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Pin to Xcode 16.4 (Swift 6.1). LogManager tests are skipped on CI via env var
# until Pulse 5.1.4 + Swift 6.0/6.1 actor-executor teardown issue is fixed upstream.
# All other tests (60 - 4 LogManager = 56) run.

env:
  MACMLX_SKIP_LOG_MANAGER_TESTS: "1"

jobs:
  spm:
    name: SPM Build & Test
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Pin Xcode 16.4
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Resolve & test MacMLXCore
        run: |
          swift package --package-path MacMLXCore resolve
          swift test --package-path MacMLXCore

      - name: Resolve & test macmlx-cli
        run: |
          swift package --package-path macmlx-cli resolve
          swift test --package-path macmlx-cli

      - name: Smoke-run macmlx --version
        run: swift run --package-path macmlx-cli macmlx --version

  app:
    name: Xcode App Build
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Pin Xcode 16.4
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Show Xcode
        run: xcodebuild -version

      - name: Build macMLX.app (Debug, no signing)
        run: |
          xcodebuild \
            -project macMLX/macMLX.xcodeproj \
            -scheme macMLX \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build
