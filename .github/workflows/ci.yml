name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Stage 1 baseline: build the two SPM packages and the SwiftUI Xcode app on every push.
# Python backend, SwiftLint, and notarized signing land in later stages.

jobs:
  spm:
    name: SPM Build & Test
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Resolve & test MacMLXCore
        run: |
          swift package --package-path MacMLXCore resolve
          swift test --package-path MacMLXCore --parallel

      - name: Resolve & test macmlx-cli
        run: |
          swift package --package-path macmlx-cli resolve
          swift test --package-path macmlx-cli --parallel

      - name: Smoke-run macmlx --version
        run: swift run --package-path macmlx-cli macmlx --version

  app:
    name: Xcode App Build
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode
        run: xcodebuild -version

      - name: Build macMLX.app (Debug, no signing)
        run: |
          xcodebuild \
            -project macMLX/macMLX.xcodeproj \
            -scheme macMLX \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build
