name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '.omc/**'
      - '**/*.md'
      - 'CHANGELOG.md'
      - 'CITATION.cff'
      - 'CITATIONS.bib'
      - 'LICENSE'
      - 'README.md'
      - 'CODE_OF_CONDUCT.md'
      - 'SECURITY.md'
      - 'CONTRIBUTING.md'
      - '.gitignore'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '.omc/**'
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch: {}

# Minute budget notes:
#   - Only code changes trigger CI (paths-ignore filters docs/plans).
#   - Consecutive pushes to the same ref cancel the older run.
#   - SPM resolution + MLX C++ compile is cached across runs (~7min -> ~2min).
#   - Use "[skip ci]" in a commit message to bypass entirely.

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  MACMLX_SKIP_LOG_MANAGER_TESTS: "1"

jobs:
  website:
    name: Static Website Build & Test
    runs-on: macos-26
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - name: Show Node.js
        run: node --version

      - name: Build and verify static website
        run: |
          node scripts/validate-social-cards.mjs
          node scripts/build-public-site.mjs
          node --test site/tests/*.test.mjs
          node scripts/crawl-public-site.mjs
          node scripts/test-public-site.mjs
          node --check scripts/build-public-site.mjs
          node --check scripts/crawl-public-site.mjs
          node --check scripts/render-brand-icons.mjs
          node --check scripts/render-social-cards.mjs
          node --check scripts/validate-social-cards.mjs
          node --check scripts/verify-cloudflare-deploy.mjs
          node --check public/assets/js/main.js
          if command -v xmllint >/dev/null 2>&1; then
            xmllint --noout site/assets/brand/macmlx-mark.svg site/assets/brand/favicon.svg public/assets/og-image.svg public/sitemap.xml
          fi

  spm:
    name: SPM Build & Test
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      # Xcode 26.4.1 ships Swift 6.3, which (unlike 6.0 in Xcode 16.4)
      # tolerates mlx-swift-lm's `private let context = CIContext()` in
      # MLXVLM/MediaProcessing.swift under strict concurrency. Pinning to
      # the GA build (not the 26.5 beta) so toolchain churn stays low.
      - name: Pin Xcode 26.4.1
        run: sudo xcode-select -s /Applications/Xcode_26.4.1.app

      - name: Cache SPM checkouts + build
        uses: actions/cache@v5
        with:
          path: |
            MacMLXCore/.build
            macmlx-cli/.build
            ~/Library/Developer/Xcode/DerivedData
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('MacMLXCore/Package.resolved', 'macmlx-cli/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Resolve & test MacMLXCore
        run: |
          swift package --package-path MacMLXCore resolve
          swift test --package-path MacMLXCore

      - name: Resolve & test macmlx-cli
        run: |
          swift package --package-path macmlx-cli resolve
          swift test --package-path macmlx-cli

      - name: Smoke-run macmlx --version
        run: swift run --package-path macmlx-cli macmlx --version

  metal:
    name: Metal Tests (xcodebuild)
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      # Xcode 26.4.1 ships Swift 6.3, which (unlike 6.0 in Xcode 16.4)
      # tolerates mlx-swift-lm's `private let context = CIContext()` in
      # MLXVLM/MediaProcessing.swift under strict concurrency. Pinning to
      # the GA build (not the 26.5 beta) so toolchain churn stays low.
      - name: Pin Xcode 26.4.1
        run: sudo xcode-select -s /Applications/Xcode_26.4.1.app

      # Xcode 26 ships the Metal compiler as a separate downloadable
      # component; without it MLX cannot JIT its shaders and every
      # MLX-gated test aborts. No-ops when already installed.
      - name: Install Metal Toolchain
        run: xcodebuild -downloadComponent MetalToolchain

      - name: Cache SPM checkouts + DerivedData
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData
            ~/Library/Caches/org.swift.swiftpm
          key: metal-${{ runner.os }}-${{ hashFiles('MacMLXCore/Package.resolved') }}
          restore-keys: |
            metal-${{ runner.os }}-

      # Runs the FULL MacMLXCore suite in a Metal-capable environment so
      # the MLX-gated tests (LoRA converter, prompt cache, sanitize,
      # indexer behavior, speed sampler) actually execute — under plain
      # `swift test` they self-skip via MLXTestSupport.
      #
      # STRICT NUMERIC PARITY (allClose 1e-4 vs Python fixtures) is
      # additionally skipped here: GitHub's macOS runners expose
      # *paravirtualized* Metal whose matmul/softmax accumulation diverges
      # from real Apple Silicon beyond 1e-4 (observed on macos-26:
      # attention prefill / decoder layer / full-model parity fail while
      # passing on real hardware). MACMLX_UNTRUSTED_METAL=1 makes those
      # suites skip via requireTrustworthyMetalOrSkip; parity remains
      # enforced on developer machines and any future self-hosted
      # Apple Silicon runner (leave the variable unset there). The
      # TEST_RUNNER_ prefix is how xcodebuild forwards env to the xctest
      # process.
      - name: Test MacMLXCore under xcodebuild (Metal)
        working-directory: MacMLXCore
        env:
          TEST_RUNNER_MACMLX_UNTRUSTED_METAL: "1"
        run: |
          xcodebuild test \
            -scheme MacMLXCore \
            -destination 'platform=macOS' \
            -skipPackagePluginValidation

  app:
    name: Xcode App Build
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      # Xcode 26.4.1 ships Swift 6.3, which (unlike 6.0 in Xcode 16.4)
      # tolerates mlx-swift-lm's `private let context = CIContext()` in
      # MLXVLM/MediaProcessing.swift under strict concurrency. Pinning to
      # the GA build (not the 26.5 beta) so toolchain churn stays low.
      - name: Pin Xcode 26.4.1
        run: sudo xcode-select -s /Applications/Xcode_26.4.1.app

      - name: Cache Xcode DerivedData
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData
            ~/Library/Caches/org.swift.swiftpm
          key: xcode-${{ runner.os }}-${{ hashFiles('MacMLXCore/Package.resolved', 'macMLX/macMLX.xcodeproj/project.pbxproj') }}
          restore-keys: |
            xcode-${{ runner.os }}-

      - name: Show Xcode
        run: xcodebuild -version

      - name: Build macMLX.app (Debug, no signing)
        run: |
          # -skipPackagePluginValidation: mlx-swift 0.31.x ships a
          # "CudaBuild" SwiftPM build-tool plugin. xcodebuild otherwise
          # fails validating the (unsigned) plugin in CI. The plugin is
          # a no-op on Apple Silicon / Metal — CUDA never builds here.
          xcodebuild \
            -project macMLX/macMLX.xcodeproj \
            -scheme macMLX \
            -configuration Debug \
            -destination 'platform=macOS' \
            -skipPackagePluginValidation \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build
