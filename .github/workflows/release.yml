name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build & Package DMG
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.app

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Install Homebrew tools
        run: brew install create-dmg

      - name: Verify backend dependencies
        working-directory: Backend
        run: uv sync

      - name: Inject version into Info.plist
        run: |
          # Strip leading "v": "v0.1.0" -> "0.1.0"
          VERSION="${GITHUB_REF_NAME#v}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" \
            macMLX/Resources/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $GITHUB_RUN_NUMBER" \
            macMLX/Resources/Info.plist
          echo "Injected version: $VERSION (build $GITHUB_RUN_NUMBER)"

      - name: Build archive
        run: ./scripts/build.sh
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Package DMG
        run: ./scripts/package-dmg.sh
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Compute SHA256
        run: |
          shasum -a 256 dist/*.dmg > dist/SHA256SUMS.txt
          cat dist/SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*.dmg
            dist/SHA256SUMS.txt
          draft: false
          generate_release_notes: true
