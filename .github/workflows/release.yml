name: Release

on:
  push:
    tags:
      - 'v*.*.*'

# Triggered when a v*.*.* tag is pushed. Builds, signs (Sparkle EdDSA),
# packages, attaches the DMG to a GitHub Release, and commits the
# updated appcast.xml back to main.
#
# Required GitHub Secrets:
#   SPARKLE_PRIVATE_KEY  - private EdDSA key from Sparkle's generate_keys
#                          tool. PEM-formatted contents only (no path).

jobs:
  build:
    name: Build, Sign & Release
    runs-on: macos-15
    timeout-minutes: 60

    permissions:
      contents: write   # needed to push appcast.xml + create release

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pin Xcode 16.4
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Install Homebrew tools
        run: brew install create-dmg

      - name: Build & archive
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: ./scripts/build.sh

      - name: Package DMG
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: ./scripts/package-dmg.sh

      - name: Package macmlx CLI tarball
        # Builds the Release-mode `macmlx` binary, strips it, and tars
        # it as macmlx-${TAG}-arm64.tar.gz for the Homebrew tap (#20).
        # Exports MACMLX_CLI_TARBALL + MACMLX_CLI_SHA256 to GITHUB_ENV
        # so the next step can render the formula.
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: ./scripts/package-cli.sh

      - name: Render Homebrew formula
        # Substitutes version/URL/sha256 into Formula/macmlx.rb and
        # writes dist/macmlx.rb. Attached to the GitHub Release so the
        # tap repo (magicnight/homebrew-mac-mlx) can pull it directly,
        # either by hand or by a follow-up automation step.
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          MACMLX_CLI_SHA256: ${{ env.MACMLX_CLI_SHA256 }}
        run: ./scripts/render-formula.sh

      - name: Sign DMG with Sparkle EdDSA
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "warning: SPARKLE_PRIVATE_KEY secret not set — skipping appcast update."
            echo "Set the secret at: https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 0
          fi
          # Resolve Sparkle's sign_update tool from the SPM checkout.
          SIGN_TOOL=$(find ~/Library/Developer/Xcode/DerivedData -name sign_update -type f -perm +111 | head -1)
          if [ -z "$SIGN_TOOL" ]; then
            # Fallback: install via Homebrew cask.
            brew install --cask sparkle
            SIGN_TOOL=$(find /opt/homebrew/Caskroom/sparkle -name sign_update -type f | head -1)
          fi
          if [ -z "$SIGN_TOOL" ]; then
            echo "error: could not locate Sparkle sign_update tool"
            exit 1
          fi
          echo "Using sign_update at: $SIGN_TOOL"
          KEY_PATH=$(mktemp)
          printf '%s' "$SPARKLE_PRIVATE_KEY" > "$KEY_PATH"
          DMG_PATH=$(ls dist/*.dmg | head -1)
          SIG_OUTPUT=$("$SIGN_TOOL" "$DMG_PATH" -f "$KEY_PATH")
          # sign_update prints the signature alone; capture it.
          SPARKLE_SIGNATURE=$(echo "$SIG_OUTPUT" | grep -oE 'sparkle:edSignature="[^"]+"' | sed 's/.*"\(.*\)"/\1/' || echo "$SIG_OUTPUT")
          DMG_SIZE=$(stat -f%z "$DMG_PATH")
          rm -f "$KEY_PATH"
          {
            echo "SPARKLE_SIGNATURE=$SPARKLE_SIGNATURE"
            echo "DMG_SIZE=$DMG_SIZE"
            echo "DMG_PATH=$DMG_PATH"
          } >> "$GITHUB_ENV"

      - name: Update appcast.xml
        # continue-on-error so a push race here doesn't kill the whole
        # release. DMG is already signed by this point; the worst-case
        # consequence of a failed appcast push is Sparkle not auto-
        # notifying about this build, recoverable by re-running this
        # step later. Pre-v0.3 a stale-push error here took out the
        # Create Release step too — fixed below.
        continue-on-error: true
        if: env.SPARKLE_SIGNATURE != ''
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python3 scripts/update_appcast.py \
              --version "$VERSION" \
              --build "$GITHUB_RUN_NUMBER" \
              --signature "$SPARKLE_SIGNATURE" \
              --size "$DMG_SIZE"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          if git diff --staged --quiet; then
            echo "No appcast changes to commit."
            exit 0
          fi
          git commit -m "chore: appcast for v${VERSION}"

          # Main may have advanced during the 10-20 minute Xcode archive
          # step. Rebase + retry so we don't lose the appcast entry to a
          # fast-forward race (what took out the v0.3.0 release initially).
          for attempt in 1 2 3; do
            git fetch origin main
            if git rebase origin/main; then
              if git push origin HEAD:main; then
                echo "Appcast pushed on attempt ${attempt}."
                exit 0
              fi
            else
              git rebase --abort || true
            fi
            echo "Appcast push attempt ${attempt} failed; retrying…"
            sleep $((attempt * 5))
          done
          echo "warning: appcast push failed after 3 attempts. DMG is still being released; re-run this step (or the whole workflow) once main quiets down."
          exit 1

      - name: Create GitHub Release
        # Always run (unless a prior required step hard-failed) so the
        # DMG gets published even if the appcast push raced with main.
        if: always()
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/*.sha256
            dist/macmlx-*.tar.gz
            dist/macmlx.rb
          draft: false
          prerelease: false
          generate_release_notes: true

      - name: Publish formula to Homebrew tap
        # Pushes dist/macmlx.rb to magicnight/homebrew-mac-mlx so
        # `brew tap magicnight/mac-mlx && brew install macmlx` Just Works
        # (#20). Skipped automatically when the cross-repo PAT isn't
        # configured — the rendered formula is still attached to the
        # release above, so a maintainer can copy it manually.
        if: env.MACMLX_CLI_SHA256 != ''
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_TOKEN secret not set — skipping tap update."
            echo "The rendered formula is attached to this release as macmlx.rb."
            echo "To enable auto-publish: create a fine-grained PAT with"
            echo "Contents: Read+Write on magicnight/homebrew-mac-mlx and"
            echo "store it as HOMEBREW_TAP_TOKEN in this repo's secrets."
            exit 0
          fi
          if [ ! -f dist/macmlx.rb ]; then
            echo "warning: dist/macmlx.rb not found — formula render must have failed."
            exit 0
          fi
          TAP_DIR="$(mktemp -d)"
          git clone --depth 1 \
            "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/magicnight/homebrew-mac-mlx.git" \
            "$TAP_DIR"
          mkdir -p "$TAP_DIR/Formula"
          cp dist/macmlx.rb "$TAP_DIR/Formula/macmlx.rb"
          cd "$TAP_DIR"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/macmlx.rb
          if git diff --staged --quiet; then
            echo "Formula already up to date."
            exit 0
          fi
          git commit -m "macmlx ${GITHUB_REF_NAME}"
          for attempt in 1 2 3; do
            if git push origin HEAD; then
              echo "Tap updated on attempt ${attempt}."
              exit 0
            fi
            git pull --rebase origin HEAD || true
            sleep $((attempt * 5))
          done
          echo "warning: tap push failed after 3 attempts."
          exit 1
