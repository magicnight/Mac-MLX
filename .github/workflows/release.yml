name: Release

on:
  push:
    tags:
      - 'v*.*.*'

# Triggered when a v*.*.* tag is pushed. Builds, signs (Sparkle EdDSA),
# packages, attaches the DMG to a GitHub Release, and commits the
# updated appcast.xml back to main.
#
# Required GitHub Secrets:
#   SPARKLE_PRIVATE_KEY  - private EdDSA key from Sparkle's generate_keys
#                          tool. PEM-formatted contents only (no path).

jobs:
  build:
    name: Build, Sign & Release
    runs-on: macos-15
    timeout-minutes: 60

    permissions:
      contents: write   # needed to push appcast.xml + create release

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pin Xcode 16.4
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Install Homebrew tools
        run: brew install create-dmg

      - name: Build & archive
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: ./scripts/build.sh

      - name: Package DMG
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: ./scripts/package-dmg.sh

      - name: Sign DMG with Sparkle EdDSA
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "warning: SPARKLE_PRIVATE_KEY secret not set — skipping appcast update."
            echo "Set the secret at: https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 0
          fi
          # Resolve Sparkle's sign_update tool from the SPM checkout.
          SIGN_TOOL=$(find ~/Library/Developer/Xcode/DerivedData -name sign_update -type f -perm +111 | head -1)
          if [ -z "$SIGN_TOOL" ]; then
            # Fallback: install via Homebrew cask.
            brew install --cask sparkle
            SIGN_TOOL=$(find /opt/homebrew/Caskroom/sparkle -name sign_update -type f | head -1)
          fi
          if [ -z "$SIGN_TOOL" ]; then
            echo "error: could not locate Sparkle sign_update tool"
            exit 1
          fi
          echo "Using sign_update at: $SIGN_TOOL"
          KEY_PATH=$(mktemp)
          printf '%s' "$SPARKLE_PRIVATE_KEY" > "$KEY_PATH"
          DMG_PATH=$(ls dist/*.dmg | head -1)
          SIG_OUTPUT=$("$SIGN_TOOL" "$DMG_PATH" -f "$KEY_PATH")
          # sign_update prints the signature alone; capture it.
          SPARKLE_SIGNATURE=$(echo "$SIG_OUTPUT" | grep -oE 'sparkle:edSignature="[^"]+"' | sed 's/.*"\(.*\)"/\1/' || echo "$SIG_OUTPUT")
          DMG_SIZE=$(stat -f%z "$DMG_PATH")
          rm -f "$KEY_PATH"
          {
            echo "SPARKLE_SIGNATURE=$SPARKLE_SIGNATURE"
            echo "DMG_SIZE=$DMG_SIZE"
            echo "DMG_PATH=$DMG_PATH"
          } >> "$GITHUB_ENV"

      - name: Update appcast.xml
        # continue-on-error so a push race here doesn't kill the whole
        # release. DMG is already signed by this point; the worst-case
        # consequence of a failed appcast push is Sparkle not auto-
        # notifying about this build, recoverable by re-running this
        # step later. Pre-v0.3 a stale-push error here took out the
        # Create Release step too — fixed below.
        continue-on-error: true
        if: env.SPARKLE_SIGNATURE != ''
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python3 scripts/update_appcast.py \
              --version "$VERSION" \
              --build "$GITHUB_RUN_NUMBER" \
              --signature "$SPARKLE_SIGNATURE" \
              --size "$DMG_SIZE"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          if git diff --staged --quiet; then
            echo "No appcast changes to commit."
            exit 0
          fi
          git commit -m "chore: appcast for v${VERSION}"

          # Main may have advanced during the 10-20 minute Xcode archive
          # step. Rebase + retry so we don't lose the appcast entry to a
          # fast-forward race (what took out the v0.3.0 release initially).
          for attempt in 1 2 3; do
            git fetch origin main
            if git rebase origin/main; then
              if git push origin HEAD:main; then
                echo "Appcast pushed on attempt ${attempt}."
                exit 0
              fi
            else
              git rebase --abort || true
            fi
            echo "Appcast push attempt ${attempt} failed; retrying…"
            sleep $((attempt * 5))
          done
          echo "warning: appcast push failed after 3 attempts. DMG is still being released; re-run this step (or the whole workflow) once main quiets down."
          exit 1

      - name: Create GitHub Release
        # Always run (unless a prior required step hard-failed) so the
        # DMG gets published even if the appcast push raced with main.
        if: always()
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/*.sha256
          draft: false
          prerelease: false
          generate_release_notes: true
