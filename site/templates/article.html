<!doctype html>
<html lang="{{htmlLang}}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!--article-head-->
  <meta name="theme-color" content="#f3f1ea" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#111311" media="(prefers-color-scheme: dark)">
  <meta name="color-scheme" content="light dark">
  <link rel="stylesheet" href="/assets/css/main.css?v=2026071101">
</head>
<body>
  <a class="skip-link" href="#main">{{skipLabel}}</a>
  <!--site-header-->
  <main id="main" class="article-main">
    <div class="page-shell article-shell">
      <!--breadcrumbs-->
      <header class="article-hero">
        <p class="article-eyebrow">{{eyebrow}}</p>
        <h1>{{title}}</h1>
        <p class="article-answer">{{directAnswer}}</p>
        <p class="verified-note">{{verifiedLabel}} <time datetime="{{lastVerified}}">{{lastVerified}}</time></p>
      </header>
      <article class="article-body">
        <!--article-content-->
      </article>
    </div>
  </main>
  <!--site-footer-->
  <script type="module" src="/assets/js/main.js?v=2026071004"></script>
</body>
</html>
