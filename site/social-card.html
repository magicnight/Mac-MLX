<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1200, initial-scale=1">
  <title>macMLX social card capture surface</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 1200px; height: 630px; margin: 0; overflow: hidden; }
    body { background: #111311; color: #f3f1ea; font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .card { position: relative; width: 1200px; height: 630px; padding: 72px 78px 68px; overflow: hidden; background: radial-gradient(circle at 85% 9%, #25412d 0, #182019 24%, #111311 58%); }
    .grid { position: absolute; inset: 0; opacity: .13; background-image: linear-gradient(#8fa092 1px, transparent 1px), linear-gradient(90deg, #8fa092 1px, transparent 1px); background-size: 48px 48px; mask-image: linear-gradient(90deg, transparent 8%, #000 58%, transparent); }
    .ring { position: absolute; right: -72px; top: -126px; width: 570px; height: 570px; border: 1px solid #587060; border-radius: 50%; box-shadow: 0 0 0 54px #172019, 0 0 0 55px #405248, 0 0 0 116px #131814, 0 0 0 117px #314039; opacity: .72; }
    header { position: relative; display: flex; align-items: center; justify-content: space-between; }
    .wordmark { display: flex; align-items: center; gap: 16px; font-size: 31px; font-weight: 720; letter-spacing: -.035em; }
    .mark { width: 45px; height: 45px; }
    .version { padding: 10px 17px; border: 1px solid #59645b; border-radius: 999px; color: #c7cec8; font: 600 17px/1 ui-monospace, SFMono-Regular, Menlo, monospace; }
    main { position: relative; margin-top: 105px; max-width: 860px; }
    .eyebrow { margin: 0 0 24px; color: #a9e88b; font: 650 18px/1.2 ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: .11em; text-transform: uppercase; }
    h1 { margin: 0; max-width: 900px; font-size: 78px; line-height: .98; letter-spacing: -.058em; font-weight: 710; text-wrap: balance; }
    .lede { margin: 30px 0 0; max-width: 810px; color: #c7cec8; font-size: 25px; line-height: 1.42; letter-spacing: -.018em; }
    footer { position: absolute; left: 78px; right: 78px; bottom: 54px; display: flex; justify-content: space-between; align-items: center; color: #9ba69e; font: 560 16px/1 ui-monospace, SFMono-Regular, Menlo, monospace; }
    footer span:last-child { color: #d9ded9; }
    html[lang="zh-CN"] h1 { font-size: 76px; letter-spacing: -.045em; }
  </style>
</head>
<body>
  <article class="card" aria-label="macMLX social card">
    <div class="grid" aria-hidden="true"></div><div class="ring" aria-hidden="true"></div>
    <header><div class="wordmark"><img class="mark" src="./assets/brand/macmlx-mark.svg" alt=""><span>macMLX</span></div><span class="version" id="version"></span></header>
    <main><p class="eyebrow" id="eyebrow"></p><h1 id="headline"></h1><p class="lede" id="lede"></p></main>
    <footer><span>macmlx.app</span><span id="platform"></span></footer>
  </article>
  <script type="module">
    import { project } from "./content/project.mjs";

    const copy = {
      en: { htmlLang: "en", eyebrow: "One native engine", headline: "Native Swift inference for Apple Silicon", lede: "A SwiftUI app, CLI, and compatible API over one in-process MLX engine.", platform: "Apple Silicon · macOS 14+" },
      zh: { htmlLang: "zh-CN", eyebrow: "一个原生引擎", headline: "Apple 芯片上的原生 Swift 推理", lede: "原生 SwiftUI 应用、CLI 与兼容 API，共用同一个 Swift 进程内 MLX 引擎。", platform: "Apple 芯片 · macOS 14+" },
    };
    const params = new URLSearchParams(window.location.search);
    const locale = params.get("locale") === "zh" ? "zh" : "en";
    const selected = copy[locale];
    document.documentElement.lang = selected.htmlLang;
    document.querySelector("#eyebrow").textContent = selected.eyebrow;
    document.querySelector("#headline").textContent = selected.headline;
    document.querySelector("#lede").textContent = selected.lede;
    document.querySelector("#platform").textContent = selected.platform;
    document.querySelector("#version").textContent = `v${project.currentVersion}`;
    await document.querySelector(".mark").decode();
    document.documentElement.dataset.captureReady = "true";
  </script>
</body>
</html>
